openapi: 3.1.1
info:
  title: Pet Clinic
  description: Pet clinic
  version: 0.0.1
paths:
  /petclinic/pets:
    get:
      summary: Get searched pets.
      operationId: getPets
      parameters:
        - name: ids
          in: query
          description: IDs of pets to be searched.
          schema:
            type: array
            uniqueItems: true
            minItems: 1
            items:
              type: string
              format: uuid
        - name: names
          in: query
          description: Names of pets to be searched.
          schema:
            type: array
            uniqueItems: true
            minItems: 1
            items:
              type: string
        - name: pageNumber
          in: query
          description: Zero-based page index.
          required: true
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: pageSize
          in: query
          description: Page size.
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        200:
          description: Found pets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetPageDto'
components:
  schemas:
    PetPageDto:
      type: object
      properties:
        items:
          type: array
          description: Page items.
          items:
            $ref: '#/components/schemas/PetDto'
        pageNumber:
          type: integer
          description: Zero-based page index.
          minimum: 0
        pageSize:
          type: integer
          description: Page size.
          minimum: 1
          maximum: 100
        totalElements:
          type: integer
          description: Total number of matching pets.
          format: int64
          minimum: 0
        totalPages:
          type: integer
          description: Total number of pages.
          minimum: 0
    PetDto:
      type: object
      properties:
        id:
          type: string
          description: Pet ID.
          format: uuid
          nullable: false
        name:
          type: string
          description: Pet name.
          nullable: false
